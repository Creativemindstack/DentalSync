<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications · Dental Sync</title>
  <meta name="description" content="View your latest alerts, appointment reminders, and messages from Dental Sync." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"><img src="../shared/Dental Sync Logo.jpg" alt="Dental Sync logo"></div>
        <div>
          <div class="brand-title">Dental Sync</div>
          <div class="brand-sub">Patient Portal</div>
        </div>
      </div>

      <span class="nav-label">Main</span>
      <a href="index.html" class="menu-item">
        <span class="icon">🏠</span> Dashboard
      </a>
      <a href="appointments.html" class="menu-item">
        <span class="icon">📅</span> Appointments
        <span class="badge">3</span>
      </a>
      <a href="records.html" class="menu-item">
        <span class="icon">📁</span> Patient Records
      </a>

      <div class="sidebar-divider"></div>
      <span class="nav-label">Account</span>
      <a href="profile.html" class="menu-item">
        <span class="icon">👤</span> My Profile
      </a>
      <a href="messages.html" class="menu-item">
        <span class="icon">💬</span> Messages
        <span class="badge">2</span>
      </a>
      <a href="notifications.html" class="menu-item active">
        <span class="icon">🔔</span> Notifications
        <span class="badge">3</span>
      </a>
      <a href="settings.html" class="menu-item">
        <span class="icon">⚙️</span> Settings
      </a>

      <div class="sidebar-spacer"></div>
      <button class="sign-out"><span>🚪</span> Sign Out</button>
      <div class="sidebar-profile">
        <div class="avatar">T</div>
        <div>
          <div class="profile-name">Testuser</div>
          <div class="profile-role">Patient</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <header class="topbar">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="search" placeholder="Search appointments, records, doctors…" />
        </div>
        <div class="topbar-actions">
          <a href="appointments.html" class="icon-btn">📅</a>
          <a href="profile.html" class="avatar-btn">T</a>
        </div>
      </header>

      <div class="page-body">

        <div class="page-heading">
          <p class="breadcrumbs">Dashboard / Notifications</p>
          <h1>Notifications</h1>
          <p>View your latest alerts, reminders, and messages.</p>
        </div>

        <div class="card" style="padding:20px;">
          <h2 style="font-size:1rem;margin-bottom:14px;">Visit Records</h2>
          <div id="syncNotificationsList"></div>
        </div>

      </div><!-- /page-body -->
    </main>
  </div>

  <div class="toast hidden" id="toastMessage"></div>
  <script src="../shared/sync.js"></script>
  <script src="shared.js"></script>
  <script src="notifications.js"></script>
</body>
</html>
